eyebrow: Service
summary: >-
  Series concept, editorial planning, interviewing as a service, episode
  scripting and repurposing.
mood: ph-azure
intro: >-
  One conversation, many outputs. Interview-led content planned and produced so
  nothing good ever goes to waste.
body: |-
  A podcast is only worth doing if it earns its time — yours and the listener's. I help shape series that have a reason to exist: a clear angle, the right guests, and a plan for everything each episode can become afterwards.

  For Tourpreneur I work on series concept, editorial planning and interviewing, then turn each conversation into show notes, articles, social and email — all in a consistent voice. The recording is the start, not the end.

  If you've got a podcast that's hard work and under-used, this is how it stops being either.
included:
  - title: Series concept & positioning
    detail: >-
      A reason for the show to exist: angle, audience and format, defined so every
      episode pulls in the same direction rather than wandering.
  - title: Episode planning & guest sourcing
    detail: >-
      Planning the run of episodes and finding the right guests — the operators
      and founders worth an hour of a listener's time.
  - title: Interviewing as a service
    detail: >-
      I run the interviews myself when needed: prepared, curious, and able to get
      a guest to say the thing they didn't plan to. Founders and operators are
      home turf.
  - title: Show notes & episode scripting
    detail: >-
      Intros, scripts and show notes that make each episode easy to find, follow
      and share — written to the same standard as the conversation.
  - title: Repurposing into articles, social & email
    detail: >-
      Every recording mined for everything it's worth: articles, social posts and
      email, so one conversation feeds weeks of content.
  - title: Consistent voice across outputs
    detail: >-
      All of it in one recognisable voice, whether it's the episode, the
      newsletter or the post — so the show feels like a brand, not a feed.
relatedProjects:
  - tourpreneur-podcast
ctaHeading: Sitting on a podcast you're not using? Let's talk.
