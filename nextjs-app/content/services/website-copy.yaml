title: Website & destination copy.
titleAccent: destination
eyebrow: Service
summary: >-
  Landing pages, destination guides, hotel and experience descriptions written
  to inspire and convert.
mood: ph-nyc
intro: >-
  The words that do the selling. Website and destination copy that makes a place
  feel worth the journey — then makes booking the obvious next step.
body: |-
  Most travel websites either read like a brochure or a booking engine. The good ones do both: enough atmosphere to make you want to go, enough clarity to make going easy. That balance is the whole job.

  I write landing pages, destination and region guides, hotel and experience descriptions, and the connective copy that holds a site together. I work from how people actually travel — what they need at each stage, and what makes them click "book" rather than "save for later".

  Everything is written with SEO, structure and conversion in mind, but it never reads like it. The reader should only notice that it's good.
included:
  - title: Landing pages & homepage copy
    detail: >-
      The pages that carry the most weight, written to lead a visitor from first
      impression to a confident booking. Clear hierarchy, strong openings, and a
      reason to act on every screen.
  - title: Destination & region guides
    detail: >-
      Long-form guides that establish you as the expert on a place. Practical
      detail and real atmosphere, structured so readers — and search engines —
      find exactly what they need.
  - title: Hotel, villa & experience descriptions
    detail: >-
      Property and experience copy that sells the feeling without overpromising.
      Specific, sensory and accurate — the kind a guest never feels let down by
      on arrival.
  - title: Tour and itinerary copy
    detail: >-
      Day-by-day itineraries and tour pages that balance the daydream with the
      logistics. Enough colour to book on, enough detail to set expectations.
  - title: SEO-informed structure & metadata
    detail: >-
      Page structure, headings, titles and meta written with search in mind from
      the start — so the copy ranks as well as it reads, without ever sounding
      written for a robot.
  - title: Tone-of-voice consistency
    detail: >-
      One coherent voice across every page, whether I write it all or work
      alongside your team — with light guidelines and editing to keep it that way
      as the site grows.
