title: Magazines & print editorial.
titleAccent: print editorial
eyebrow: Service
summary: >-
  Customer magazines, lookbooks, 50–150pp buying guides — the work most
  freelancers can't credibly pitch for.
mood: ph-villa
intro: >-
  Long-form, print-led editorial that earns its place on the coffee table — and
  quietly sends bookings up.
body: |-
  A customer magazine is a strange, wonderful brief: it has to feel like editorial, not marketing, while still doing a commercial job. That takes someone who can plan a 150-page issue, commission and brief contributors, edit to a house voice, and write the bulk of it themselves.

  That's the work I'm known for. Vintage Travel's magazine ran to 150 pages across France, Spain, Italy and Greece, was mailed to 8,000 customers, and was followed by a 22% lift in bookings. It's the kind of project most freelancers can't credibly pitch for — and exactly the kind I love.

  Whether it's a single lookbook or a recurring title, I handle it end to end: concept, flat-plan, commissioning, writing and edit.
included:
  - title: Concept & editorial flat-plan
    detail: >-
      The shape of the whole issue before a word is written: themes, sections,
      page counts and flow. A flat-plan everyone can sign off, so production
      never drifts.
  - title: Commissioning & contributor briefs
    detail: >-
      Finding the right writers and photographers and briefing them properly —
      clear scope, tone and deadlines, so what comes back actually fits the book.
  - title: Feature writing & destination guides
    detail: >-
      The bulk of the words: features, destination guides and the connective
      copy that makes a magazine feel considered rather than assembled.
  - title: Copy-editing to a house voice
    detail: >-
      Editing every contribution to one consistent voice and standard — accuracy,
      tone and flow — so the finished issue reads as though one person wrote it.
  - title: Print-ready editorial sign-off
    detail: >-
      Final proofing and sign-off to print spec, working with designers and
      printers so nothing slips between the last edit and the press.
  - title: 50–150pp magazines & lookbooks
    detail: >-
      The full object, end to end — from a slim lookbook to a 150-page customer
      magazine like Vintage Travel's. Planned, written, edited and delivered.
