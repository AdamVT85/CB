title: Strategy, audits & training.
titleAccent: training
eyebrow: Service
summary: >-
  Content audits, editorial planning, SEO-informed calendars and travel
  copywriting workshops.
mood: ph-alps
intro: >-
  Sometimes you don't need another freelancer — you need a plan, or a sharper
  team. This is the work behind the work.
body: |-
  Not every problem is solved by more content. Often it's solved by knowing what to stop doing, what to prioritise, and how to brief it well. That's where an audit, a plan, or a bit of training does more than another batch of blog posts ever could.

  I run content audits, build SEO-informed editorial calendars, and help in-house teams brief and write travel content with more confidence. I've sat on both sides — five years running content at Kyero, and a decade freelancing — so the advice is practical, not theoretical.

  Think of it as borrowing a senior travel content operator for as long as you need one.
included:
  - title: Content audits & gap analysis
    detail: >-
      A clear-eyed look at what you've got, what's working and what's missing —
      findings you can act on, not a 60-page deck nobody reads.
  - title: Editorial strategy & calendars
    detail: >-
      A practical plan and calendar tied to your goals and resources: what to
      make, when, and why — so the team stops guessing.
  - title: SEO-informed planning
    detail: >-
      Keyword and search insight built into the plan from the start, so the
      content you commission has a reason to exist and a route to being found.
  - title: Tone-of-voice & messaging guides
    detail: >-
      Voice and messaging documented so anyone writing for you sounds like you —
      useful for in-house teams and freelancers alike.
  - title: Travel copywriting workshops
    detail: >-
      Hands-on sessions that make your team sharper at travel copy — structure,
      tone, and the difference between inspiring and waffling.
  - title: Team briefing & editing support
    detail: >-
      Ongoing help briefing writers and editing their work, so standards hold up
      even when I'm not the one writing.
